name: Batch Render 10 Videos

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Bundle Remotion project
        run: npx remotion bundle src/index.ts --out-dir dist

      - name: Deploy Remotion Lambda
        run: npx remotion lambda functions deploy --region us-east-1

      - name: Render 10 videos (Lambda)
        run: npx ts-node scripts/batch-render.ts

      - name: Upload all videos
        uses: actions/upload-artifact@v4
        with:
          name: all-videos
          path: out/*.mp4
          retention-days: 7
