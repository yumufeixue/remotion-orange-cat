name: Deploy Remotion Lambda

on:
  workflow_dispatch:
    inputs:
      aws_access_key_id:
        description: 'AWS Access Key ID'
        required: true
        type: string
      aws_secret_access_key:
        description: 'AWS Secret Access Key'
        required: true
        type: string
        sensitive: true
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ inputs.aws_access_key_id }}
          aws-secret-access-key: ${{ inputs.aws_secret_access_key }}
          aws-region: ${{ inputs.aws_region }}

      - name: Deploy Remotion Lambda functions
        run: npx remotion lambda deploy

      - name: Output deployed info
        run: |
          echo "✅ Lambda functions deployed successfully!"
          echo "Reminder: Add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY as repository secrets"
          echo "for automated workflow runs (Settings → Secrets and variables → Actions)"
