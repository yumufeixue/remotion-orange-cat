name: Render Video

on:
  workflow_dispatch:  # 手动触发
    inputs:
      composition:
        description: 'Composition name (e.g. src/index.ts)'
        required: true
        default: 'src/index.ts'
      output:
        description: 'Output filename'
        required: true
        default: 'out/orange-cat-cooking.mp4'

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Render video on Lambda
        run: |
          npx remotion lambda render "${{ github.event.inputs.composition }}" "${{ github.event.inputs.output }}" --region us-east-1

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotion-video
          path: ${{ github.event.inputs.output }}
          retention-days: 7

      - name: Get video info
        run: |
          echo "Video rendered: ${{ github.event.inputs.output }}"
          ls -lh "${{ github.event.inputs.output }}"
