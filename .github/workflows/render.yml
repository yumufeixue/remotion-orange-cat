name: Render Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Composition (e.g. src/index.ts)'
        required: true
        default: 'src/index.ts'
        type: string
      output:
        description: 'Output filename (e.g. out/orange-cat-cooking.mp4)'
        required: true
        default: 'out/orange-cat-cooking.mp4'
        type: string
      aws_access_key_id:
        description: 'AWS Access Key ID'
        required: true
        type: string
      aws_secret_access_key:
        description: 'AWS Secret Access Key'
        required: true
        type: string
        sensitive: true
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'
        type: string

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ inputs.aws_access_key_id }}
          aws-secret-access-key: ${{ inputs.aws_secret_access_key }}
          aws-region: ${{ inputs.aws_region }}

      - name: Render video on Lambda
        run: |
          npx remotion lambda render "${{ inputs.composition }}" "${{ inputs.output }}" --region ${{ inputs.aws_region }}

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotion-video
          path: ${{ inputs.output }}
          retention-days: 7

      - name: Summary
        run: |
          echo '✅ Video rendered: ${{ inputs.output }}'
          ls -lh "${{ inputs.output }}"
